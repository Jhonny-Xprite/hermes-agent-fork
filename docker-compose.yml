#
# docker-compose.yml for Hermes Agent
#
# Easypanel / VPS compatible by default:
#   - no container_name entries, so the platform can name services safely
#   - no network_mode: host, so reverse proxies and service discovery work
#   - durable named volume for HERMES_HOME (/opt/data)
#
# Required environment variables before deploy:
#   HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
#   HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=<strong-password>
#   HERMES_DASHBOARD_BASIC_AUTH_SECRET=<long-random-secret>
#
# Optional:
#   HERMES_DASHBOARD_PORT=9119
#   HERMES_UID=10000
#   HERMES_GID=10000
#
# Security notes:
#   - The dashboard binds to 0.0.0.0 inside the container because Easypanel
#     needs to proxy to it. Hermes requires an auth provider on public binds;
#     this compose enables the bundled basic-auth provider via env vars.
#   - API keys should be configured through Hermes config/dashboard or injected
#     as service environment variables in Easypanel. Do not commit secrets.
#   - If you override entrypoint, keep `/init` as the first command in the
#     chain (or let Docker use the image's default ENTRYPOINT).
#
services:
  gateway:
    build: .
    image: hermes-agent
    restart: unless-stopped
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      # To expose the OpenAI-compatible API server, add a port mapping and set:
      # API_SERVER_HOST: 0.0.0.0
      # API_SERVER_KEY: ${API_SERVER_KEY}
      #
      # Microsoft Teams webhook, if enabled, also needs a matching port mapping:
      # TEAMS_CLIENT_ID: ${TEAMS_CLIENT_ID}
      # TEAMS_CLIENT_SECRET: ${TEAMS_CLIENT_SECRET}
      # TEAMS_TENANT_ID: ${TEAMS_TENANT_ID}
      # TEAMS_ALLOWED_USERS: ${TEAMS_ALLOWED_USERS}
      # TEAMS_PORT: ${TEAMS_PORT:-3978}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:?Set HERMES_DASHBOARD_BASIC_AUTH_USERNAME in Easypanel}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?Set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD in Easypanel}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET:?Set HERMES_DASHBOARD_BASIC_AUTH_SECRET in Easypanel}
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:${HERMES_DASHBOARD_PORT:-9119}"
    command:
      [
        "dashboard",
        "--host",
        "0.0.0.0",
        "--port",
        "${HERMES_DASHBOARD_PORT:-9119}",
        "--no-open",
      ]

volumes:
  hermes-data:
